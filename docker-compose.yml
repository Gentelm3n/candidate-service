version: '3.8'

services:
  candidate-service:
    build: .
    container_name: candidate-service
    environment:
      PROVIDER_URL: http://provider-simulator:8081
      DATABASE_URL: sqlite+aiosqlite:////data/candidate.db
      PYTHONPATH: /app/src
    ports:
      - "8080:8080"
    volumes:
      - candidate-data:/data
    networks:
      - app-network
    restart: unless-stopped

  provider-simulator:
    image: ghcr.io/fintech-dev-lab/internship-provider-simulator:v0.2.0
    container_name: provider-simulator
    environment:
      CALLBACK_URL: http://candidate-service:8080/receipts
    ports:
      - "8081:8081"
    networks:
      - app-network
    depends_on:
      - candidate-service

volumes:
  candidate-data:
    driver: local

networks:
  app-network:
    driver: bridge